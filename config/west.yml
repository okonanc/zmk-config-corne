manifest:
  defaults:
    remote: urob
    revision: v0.3 # Pin everything to v0.1

  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: urob
      url-base: https://github.com/urob
    - name: mctechnology17
      url-base: https://github.com/mctechnology17
    - name: carrefinho
      url-base: https://github.com/carrefinho
    # - name: janpfischer
    #   url-base: https://github.com/janpfischer
    - name: m165437
      url-base: https://github.com/M165437

  projects:
    - name: zmk
      remote: zmkfirmware
      revision: v0.3
      # revision: main
      import: app/west.yml

    # ZMK modules
    - name: zmk-adaptive-key
      path: modules/zmk/adaptive-key
    - name: zmk-auto-layer
      path: modules/zmk/auto-layer
    - name: zmk-helpers
      path: modules/zmk/helpers
    - name: zmk-leader-key
      path: modules/zmk/leader-key
    - name: zmk-tri-state
      path: modules/zmk/tri-state
    - name: zmk-unicode
      path: modules/zmk/unicode

    # Nicer visuals on Nice!View and Display
    # nice_epaper support
    - name: zmk-nice-oled
      remote: mctechnology17
      revision: main
    # dongle_display!view
    # - name: zmk-dongle-display-view
    #   remote: mctechnology17
    #   revision: main

    - name: nice-view-gem
      remote: m165437
      revision: v0.3.0

    # Prospector
    - name: prospector-zmk-module
      remote: carrefinho
      revision: main
      # revision: feat/new-status-screens

    # - name: zmk-dongle-screen
    #   remote: janpfischer
    #   revision: main

    # Temporarily overload Zephyr until
    # https://github.com/zmkfirmware/zephyr/pull/40 is merged.
    - name: zephyr
      revision: v3.5.0+zmk-fixes
      remote: zmkfirmware
      # revision: v4.1.0+zmk-fixes
      clone-depth: 1
      import:
        # Only enable most commonly used boards. For less common hardware one
        # may need to enable additional modules.
        name-allowlist:
          - cmsis
          - hal_nordic
          - hal_rpi_pico
          - hal_stm32
          - lvgl
          - mbedtls
          - tinycrypt
          
  self:
    path: config
