#CONFIG_BUILD_OUTPUT_UF2=y
#CONFIG_BUILD_OUTPUT_UF2_FAMILY_ID="0xADA52840"
# CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
#CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Enable deep sleep
CONFIG_ZMK_SLEEP=y
CONFIG_PM_DEVICE=n
# Milliseconds of inactivity before entering deep sleep, def: 900s -> 15min
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
# Milliseconds of inactivity before entering idle state, def: 30s
CONFIG_ZMK_IDLE_TIMEOUT=30000
# Enables a combination of settings that are planned to be default in future versions of ZMK to improve connection stability. Currently this only disables 2M PHY support.
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
# Enable support to control external power output
CONFIG_ZMK_EXT_POWER=n

CONFIG_ZMK_SPLIT_ROLE_CENTRAL=n

# Enable support for displays
CONFIG_ZMK_DISPLAY=n

