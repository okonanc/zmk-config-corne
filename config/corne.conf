# Uncomment the following lines to enable the Corne RGB Underglow
# CONFIG_ZMK_RGB_UNDERGLOW=y
# CONFIG_WS2812_STRIP=y

# Uncomment the following line to enable the Corne OLED Display
CONFIG_ZMK_DISPLAY=y

# Make mouse available
#CONFIG_ZMK_MOUSE=n
#CONFIG_ZMK_MOUSE_TICK_DURATION=8

# Set deep sleep to 15 minutes
# 30 seconds of inactivity before entering idle state
CONFIG_ZMK_IDLE_TIMEOUT=30000
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Enable USB drivers
#CONFIG_USB=y

# Enable ZMK as a USB keyboard
#CONFIG_ZMK_USB=y

# Enable Bluetooth support
CONFIG_BT=y
# Enable ZMK as a Bluetooth keyboard
CONFIG_ZMK_BLE=y

# Make Bluetooth stronger
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Increase polling rate - default is 9ms = 111 hz polling rate, 2ms = 500hz, 1ms = 1000hz
CONFIG_USB_HID_POLL_INTERVAL_MS=1

CONFIG_PM_DEVICE=y
# Enable support to control external power output
CONFIG_ZMK_EXT_POWER=y

# Show battery percantage instead of icon
#CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y

# Change board name
# CONFIG_ZMK_KEYBOARD_NAME="Infinity Corne"

#CONFIG_ZMK_DISPLAY_INVERT=y

# Enable split keyboard support
CONFIG_ZMK_SPLIT=y
# CONFIG_ZMK_SPLIT_ROLE_CENTRAL = y for central device, n for peripheral
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
CONFIG_ZMK_SPLIT_BLE_ROLE_CENTRAL=n

# Enable eager debouncing
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=7

# Combo configuration
CONFIG_ZMK_COMBO_MAX_COMBOS_PER_KEY=8

# Turn on logging, and set ZMK logging to debug output
CONFIG_ZMK_USB_LOGGING=n
