  - board: nice_nano_v2
    # shield: corne_left nice_view_adapter nice_epaper
    # cmake-args: -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    shield: corne_left_central nice_view_adapter nice_epaper
    artifact-name: nano_view_corne_left_central
  #
  # # Right + Nice!View
  - board: nice_nano_v2
    # cmake-args: -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    shield: corne_right_peripheral nice_view_adapter nice_epaper
    artifact-name: nano_view_corne_right_peripheral
  #
  # # Left Peripheral in combination with dongle
  - board: nice_nano_v2
    shield: corne_left_peripheral nice_view_adapter nice_epaper
    artifact-name: nano_view_corne_left_peripheral
    # snippet: studio-rpc-usb-uart
  #
  # ### Dongle Settings
  # # Dongle (pro micro) + Nice!View 
  # - board: nice_nano_v2
  #   # shield: corne_dongle_pro_micro nice_view_adapter nice_epaper
