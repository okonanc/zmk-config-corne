# This file generates the GitHub Actions matrix
# For simple board + shield combinations, add them
# to the top level board and shield arrays, for more
# control, add individual board + shield combinations to
# the `include` property, e.g:
#
# board: [ "nice_nano_v2" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano_v2
#     shield: reviung41
#   - board: nice_nano_v2
#    shield: settings_reset

---
include:
  # Use central instead of left, when dongle is disabled
  # - board: nice_nano_v2 
  #   artifact-name: infinity_central
  #   shield: corne_central nice_view
#    snippet: studio-rpc-usb-uart
  - board: nice_nano_v2 
    artifact-name: infinity_left
    # this is correct for left side, to have the nice_view_adapter in the shield
    shield: corne_left nice_view_adapter nice_view
  - board: nice_nano_v2
    artifact-name: infinity_right
    shield: corne_right 
  - board: nice_nano_v2
    artifact-name: infinity_dongle
    # this is correct for dongle
    shield: corne_dongle nice_view
    # shield: corne_dongle nice_view
#    snippet: studio-rpc-usb-uartds
  # Dongle with Logging enabled
  # - board: nice_nano_v2
  #   artifact-name: infinity_dongle_with_logging
  #   shield: corne_dongle nice_view
  #   snippet: zmk-usb-logging
#    cmake-args: -DCONFIG_ZMK_USB_LOGGING=y
#    snippet: studio-rpc-usb-uart
  # Central with Logging enabled
  # - board: nice_nano_v2
  #   artifact-name: infinity_central_with_logging
  #   shield: corne_central nice_view
  #   snippet: zmk-usb-logging    
#    cmake-args: -DCONFIG_ZMK_USB_LOGGING=y
#    snippet: studio-rpc-usb-uart
  - board: nice_nano_v2
    shield: settings_reset
