---
include:
  # # Left (Central) + Nice!View
  - board: nice_nano_v2
    # shield: corne_left nice_view_adapter nice_epaper
    cmake-args: -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    shield: corne_left nice_view_adapter nice_view_gem
    artifact-name: nano_view_corne_left
  #
  # # Right + Nice!View
  - board: nice_nano_v2
    cmake-args: -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    shield: corne_right nice_view_adapter nice_view_gem
    artifact-name: nano_view_corne_right
  #
  # # Left Peripheral in combination with dongle
  # - board: nice_nano_v2
  #   shield: corne_left_peripheral nice_view_adapter nice_view_gem
  #   artifact-name: nano_view_corne_left_peripheral
  #   # snippet: studio-rpc-usb-uart
  #
  # ### Dongle Settings
  # # Dongle (pro micro) + Nice!View 
  # - board: nice_nano_v2
  #   # shield: corne_dongle_pro_micro nice_view_adapter nice_epaper
  #   shield: corne_dongle_pro_micro nice_view_adapter dongle_display_view_pro_micro
  #   artifact-name: nano_view_corne_dongle
  #   # snippet: studio-rpc-usb-uart
  #
  # Dongle (Seeed XIAO BLE) + Prospector
  - board: seeeduino_xiao_ble
    # shield: corne_dongle_pro_micro nice_view_adapter nice_epaper
    cmake-args: -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
    shield: corne_dongle_xiao #prospector_adapter
    artifact-name: xiao_prospector_corne_dongle
    snippet: studio-rpc-usb-uart

  ### Reset Settings
  - board: nice_nano_v2
    shield: settings_reset
    artifact-name: nano_settings_reset
  - board: seeeduino_xiao_ble
    shield: settings_reset
    artifact-name: xiao_settings_reset

